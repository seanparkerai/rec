# fetch-listings — v3 L1 listing fetcher.
# Runs tools/fetch-listings.mjs on a GitHub runner (which has internet, unlike the
# Claude sandbox). Writes normalised rows into the Supabase `listings` table via
# the service role.
#
# Triggers:
#   - workflow_dispatch: tap "Run workflow" in the Actions tab (phone-friendly).
#   - schedule: daily at 12:00 NOON Europe/London (England local time), DST-safe.
#     24-hour recency window, MAX_DAYS_SINCE_ADDED=1. Comment out the `schedule`
#     block to pause.
#
# Timing design (READ THIS before changing the schedule or the gate):
#   Goal: fire the daily fetch once per day, at 12:00 noon Europe/London (England
#   local time), DST-safe, never twice.
#
#   Two hard facts about GitHub-hosted cron force this design:
#     1. Cron is UTC-only (no timezone field). London is UTC+1 in summer (BST) and
#        UTC+0 in winter (GMT), so no single fixed cron means "noon London" all year.
#     2. Scheduled runs are best-effort and routinely START HOURS LATE under platform
#        load — measured on THIS repo at 3.5–6.5 h late every day. So we cannot trust
#        the fire time to land in any narrow local-time window.
#
#   Therefore:
#     - We schedule TWO candidate UTC ticks that bracket noon London across DST:
#           0 11 * * *  → 12:00 London in summer (BST); 11:00 London in winter
#           0 12 * * *  → 13:00 London in summer;       12:00 London in winter (GMT)
#       Because GitHub fires them late, both ticks (whenever they actually land) are
#       funnelled through the gate below.
#     - The "Noon Europe/London gate" job step enforces, for scheduled runs only:
#         (a) FLOOR — never execute before 12:00 Europe/London (skips the winter
#             11:00 tick and any early fire), and
#         (b) ONCE-PER-DAY — query this workflow's own run history via the GitHub API
#             and skip if a real fetch already executed today (London date). This
#             makes the delayed/duplicate ticks idempotent so Apify is never
#             double-triggered.
#       Net effect: exactly one fetch per day, at the first scheduled opportunity at
#       or after noon London. Manual (workflow_dispatch) and push runs bypass the gate.
#     - `concurrency` (below) queues a second simultaneous tick behind the first so
#       the once-per-day check can't be raced.
#
#   PRECISION CAVEAT: the gate guarantees the right DAY and "not before noon," but it
#   cannot make GitHub's backlogged queue punctual — in practice the run lands noon→
#   early-afternoon London, not 12:00:00 sharp. For minute-accurate noon, drive the
#   workflow from an external scheduler (e.g. Supabase pg_cron + pg_net, or a hosted
#   cron service) that calls the workflow_dispatch API at exactly 12:00 Europe/London.
#   The fetcher also self-heals: a missed day is recovered by the 3-day recency overlap.
#
# Requires repo secrets: APIFY_TOKEN, APIFY_ACTOR_ID, SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY.
#
# Cost guardrail: APIFY_MAX_BUDGET_USD (default 25) is passed to the actor as
# maxBudget — Apify self-terminates at the cap. No overrun is possible on PPE actors.
# Daily top-up (24h, cluster): ~50 results → ~$0.10/run. Foundation (14d): ~$4 worst-case.
name: fetch-listings

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fetch + normalise only, do not write'
        type: boolean
        default: false
      foundation_mode:
        description: 'Foundation pull (14-day backfill). ALWAYS dry-run first to review projected cost before enabling writes.'
        type: boolean
        default: false
      max_days_since_added:
        description: 'Recency window in days. Rightmove accepts 1, 3, 7, 14 only; any other value returns 0 results. Ignored when foundation_mode is on (forces 14).'
        type: choice
        default: '1'
        options:
          - '1'
          - '3'
          - '7'
          - '14'
      search_mode:
        description: 'Search granularity: outcode (whole districts), village (per-village disks), or cluster (recommended)'
        type: choice
        default: cluster
        options:
          - cluster
          - outcode
          - village
      fetch_limit:
        description: 'Max search targets to process (0 = all). Set 1 for a cheap validation run.'
        type: string
        default: '0'
      results_per_target:
        description: 'Max listings per search target (lower = cheaper on pay-per-event actors)'
        type: string
        default: '50'
      cluster_cap_mi:
        description: 'Cluster disk cap (miles). Lower = tighter/less paid noise but more searches. 5≈69, 7≈43, 9≈34 searches.'
        type: string
        default: '7'
      apify_budget_usd:
        description: 'Hard USD spend cap passed to Apify actor. Actor self-terminates at this limit.'
        type: string
        default: '25'
  schedule:
    # Both ticks target 12:00 Europe/London; the gate step keeps only the in-season
    # one (11:00 UTC in summer/BST, 12:00 UTC in winter/GMT). Do NOT collapse to one
    # line — see the header comment.
    - cron: '0 11 * * *'  # 12:00 London during BST (summer)
    - cron: '0 12 * * *'  # 12:00 London during GMT (winter)
  # Pushing a change to THIS file on main kicks off one immediate run.
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-listings.yml'

permissions:
  contents: read
  actions: read   # the noon gate reads this workflow's run history to dedupe (once-per-day)

# Queue a second simultaneous tick behind the first so the once-per-day gate can't be
# raced into a double fetch. Do not cancel in-progress — let the first run finish.
concurrency:
  group: fetch-listings-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      # Delay-tolerant, DST-safe, once-per-day noon gate (see header for the full
      # rationale). For SCHEDULED runs only: never execute before noon Europe/London,
      # and skip if a real fetch already ran today. Manual/push runs bypass entirely.
      - name: Noon Europe/London gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Trigger=${{ github.event_name }} (manual/push) — gate bypassed, proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOW_LONDON=$(TZ='Europe/London' date '+%Y-%m-%d %H:%M:%S %Z (%:z)')
          HOUR_LONDON=$(TZ='Europe/London' date '+%H')
          TODAY_LONDON=$(TZ='Europe/London' date '+%F')
          echo "Europe/London now: $NOW_LONDON  (date=$TODAY_LONDON hour=$HOUR_LONDON)"

          # (a) FLOOR — never run before noon England time.
          if [ "$HOUR_LONDON" -lt 12 ]; then
            echo "::notice::Before noon in England (hour=$HOUR_LONDON) — early/off-season tick, skipping; the noon-or-later tick will run."
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # (b) ONCE-PER-DAY — has a real fetch already executed today (London date)?
          # GitHub fires these crons hours late and may fire BOTH daily ticks, so we
          # must not double-trigger Apify. A prior run "really fetched" if its job has
          # the "Fetch listings" step with a non-skipped conclusion/status.
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/fetch-listings.yml/runs?per_page=50"
          runs=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$api" || true)
          if [ -z "$runs" ]; then
            echo "::warning::Could not read run history for the once-per-day check — proceeding (a rare double-run is bounded by APIFY_MAX_BUDGET_USD)."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          already=false
          while read -r id created; do
            [ -n "$id" ] || continue
            [ "$id" = "${GITHUB_RUN_ID}" ] && continue
            d=$(TZ='Europe/London' date -d "$created" '+%F')
            [ "$d" = "$TODAY_LONDON" ] || continue
            jobs=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${id}/jobs" || true)
            hit=$(printf '%s' "$jobs" | jq '[.jobs[]?.steps[]? | select(.name=="Fetch listings") | select(.conclusion=="success" or .conclusion=="failure" or .status=="in_progress")] | length' 2>/dev/null || echo 0)
            if [ "${hit:-0}" -gt 0 ]; then already=true; break; fi
          done <<EOF
          $(printf '%s' "$runs" | jq -r '.workflow_runs[] | "\(.id) \(.created_at)"')
          EOF

          if [ "$already" = true ]; then
            echo "::notice::A fetch already executed today ($TODAY_LONDON London) — skipping this delayed/duplicate tick."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Noon-or-later in England and no fetch yet today — proceeding with the daily fetch."
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: '20'
      - name: Fetch listings
        if: steps.gate.outputs.run == 'true'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          # foundation_mode overrides the recency window to 14 days in the fetcher.
          # Scheduled runs carry no inputs, so the `|| '1'` fallback keeps them on the
          # 24h window; manual dispatch can pick 1/3/7/14 via max_days_since_added.
          FOUNDATION_MODE: ${{ inputs.foundation_mode && '1' || '0' }}
          MAX_DAYS_SINCE_ADDED: ${{ inputs.max_days_since_added || '1' }}
          # Hard spend cap: actor self-terminates at this USD limit (PPE — no overrun).
          # Dispatch can override; scheduled runs use the hardcoded default of $25.
          APIFY_MAX_BUDGET_USD: ${{ inputs.apify_budget_usd || '25' }}
          SEARCH_MODE: ${{ inputs.search_mode || 'cluster' }}
          FETCH_LIMIT: ${{ inputs.fetch_limit || '0' }}
          RESULTS_PER_OUTCODE: ${{ inputs.results_per_target || '50' }}
          CLUSTER_CAP_MI: ${{ inputs.cluster_cap_mi || '7' }}
        run: node tools/fetch-listings.mjs
