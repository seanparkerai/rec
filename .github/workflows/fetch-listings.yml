# fetch-listings — v3 L1 listing fetcher.
# Runs tools/fetch-listings.mjs on a GitHub runner (which has internet, unlike the
# Claude sandbox). Writes normalised rows into the Supabase `listings` table via
# the service role. Replaces the throwaway L0 probe workflow.
#
# Triggers:
#   - workflow_dispatch: tap "Run workflow" in the Actions tab (phone-friendly).
#   - schedule: daily at 07:10 UTC. Comment out the `schedule` block to pause.
#
# Requires repo secrets: APIFY_TOKEN, APIFY_ACTOR_ID, SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY. (The same secrets the L0 probe used.)
name: fetch-listings

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fetch + normalise only, do not write'
        type: boolean
        default: false
      search_mode:
        description: 'Search granularity (L7.4): outcode (whole districts), village (per-village disks), or cluster (recommended — few tight disks covering all villages)'
        type: choice
        default: cluster
        options:
          - cluster
          - outcode
          - village
      fetch_limit:
        description: 'Max search targets to process (0 = all). Set 1 for a cheap validation run.'
        type: string
        default: '0'
      results_per_target:
        description: 'Max listings per search target (lower = cheaper on pay-per-event actors)'
        type: string
        default: '50'
      cluster_cap_mi:
        description: 'Cluster disk cap (miles). Lower = tighter/less paid noise but more searches. 5≈69, 7≈43, 9≈34 searches.'
        type: string
        default: '7'
  schedule:
    - cron: '10 7 * * *'
  # Pushing a change to THIS file kicks off one immediate run (used to roll out the
  # cluster default once resolve-areas has resolved every village to a tight id).
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-listings.yml'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch listings
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          # All 195 villages now resolve to a tight identifier, so cluster is the
          # default for BOTH manual dispatch and the scheduled/push run — tight
          # village disks instead of whole districts. Override per-dispatch if needed.
          SEARCH_MODE: ${{ inputs.search_mode || 'cluster' }}
          FETCH_LIMIT: ${{ inputs.fetch_limit || '0' }}
          RESULTS_PER_OUTCODE: ${{ inputs.results_per_target || '50' }}
          CLUSTER_CAP_MI: ${{ inputs.cluster_cap_mi || '7' }}
        run: node tools/fetch-listings.mjs
