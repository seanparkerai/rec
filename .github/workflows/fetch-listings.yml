# fetch-listings — v3 L1 listing fetcher.
# Runs tools/fetch-listings.mjs on a GitHub runner (which has internet, unlike the
# Claude sandbox). Writes normalised rows into the Supabase `listings` table via
# the service role.
#
# Triggers:
#   - workflow_dispatch: tap "Run workflow" in the Actions tab (phone-friendly).
#   - schedule: daily at 06:00 UTC (24-hour recency window, MAX_DAYS_SINCE_ADDED=1).
#     Comment out the `schedule` block to pause.
#
# Requires repo secrets: APIFY_TOKEN, APIFY_ACTOR_ID, SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY.
#
# Cost guardrail: APIFY_MAX_BUDGET_USD (default 25) is passed to the actor as
# maxBudget — Apify self-terminates at the cap. No overrun is possible on PPE actors.
# Daily top-up (24h, cluster): ~50 results → ~$0.10/run. Foundation (14d): ~$4 worst-case.
name: fetch-listings

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fetch + normalise only, do not write'
        type: boolean
        default: false
      foundation_mode:
        description: 'Foundation pull (14-day backfill). ALWAYS dry-run first to review projected cost before enabling writes.'
        type: boolean
        default: false
      max_days_since_added:
        description: 'Recency window in days. Rightmove accepts 1, 3, 7, 14 only; any other value returns 0 results. Ignored when foundation_mode is on (forces 14).'
        type: choice
        default: '1'
        options:
          - '1'
          - '3'
          - '7'
          - '14'
      search_mode:
        description: 'Search granularity: outcode (whole districts), village (per-village disks), or cluster (recommended)'
        type: choice
        default: cluster
        options:
          - cluster
          - outcode
          - village
      fetch_limit:
        description: 'Max search targets to process (0 = all). Set 1 for a cheap validation run.'
        type: string
        default: '0'
      results_per_target:
        description: 'Max listings per search target (lower = cheaper on pay-per-event actors)'
        type: string
        default: '50'
      cluster_cap_mi:
        description: 'Cluster disk cap (miles). Lower = tighter/less paid noise but more searches. 5≈69, 7≈43, 9≈34 searches.'
        type: string
        default: '7'
      apify_budget_usd:
        description: 'Hard USD spend cap passed to Apify actor. Actor self-terminates at this limit.'
        type: string
        default: '25'
  schedule:
    - cron: '0 6 * * *'
  # Pushing a change to THIS file on main kicks off one immediate run.
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-listings.yml'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch listings
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          # foundation_mode overrides the recency window to 14 days in the fetcher.
          # Scheduled runs carry no inputs, so the `|| '1'` fallback keeps them on the
          # 24h window; manual dispatch can pick 1/3/7/14 via max_days_since_added.
          FOUNDATION_MODE: ${{ inputs.foundation_mode && '1' || '0' }}
          MAX_DAYS_SINCE_ADDED: ${{ inputs.max_days_since_added || '1' }}
          # Hard spend cap: actor self-terminates at this USD limit (PPE — no overrun).
          # Dispatch can override; scheduled runs use the hardcoded default of $25.
          APIFY_MAX_BUDGET_USD: ${{ inputs.apify_budget_usd || '25' }}
          SEARCH_MODE: ${{ inputs.search_mode || 'cluster' }}
          FETCH_LIMIT: ${{ inputs.fetch_limit || '0' }}
          RESULTS_PER_OUTCODE: ${{ inputs.results_per_target || '50' }}
          CLUSTER_CAP_MI: ${{ inputs.cluster_cap_mi || '7' }}
        run: node tools/fetch-listings.mjs
