# radius-tune — per-area learned search radius (docs/REFINEMENT_README.md "Per-area
# learned search radius"). Runs tools/radius-tune.mjs on a GitHub runner and APPLIES the
# plan over the Supabase REST API with the service role (`--apply`). The plan touches ONLY
# area_search_tuning, refinement_suggestions (dimension 'area_radius') and sync_log — never
# listings, criteria, zones, or the scrape scope set.
#
# ZERO EXTRA SECRETS. Apply is via PostgREST (the same service-role key the fetcher uses),
# so this needs only the two secrets the project already has — NO SUPABASE_DB_URL / psql.
# The service role bypasses RLS, and planRadii pre-resolves the sticky status + the
# override-folded radius, so a merge-duplicates UPSERT is exactly what the SQL plan would do.
#
# CADENCE. Daily at ~05:30 UTC — AHEAD of the 06:00 refinement-run and the 08:00 fetch, so
# the day's fetch reads a fresh radius. Fully idempotent, so a missed or repeated run is
# harmless; the exploration ring is time-based, so cadence drift never breaks it.
#
# REQUIRED REPO SECRETS (already present for the fetcher; the job no-ops if missing):
#   - SUPABASE_URL               https://<project>.supabase.co  (PostgREST reads + writes)
#   - SUPABASE_SERVICE_ROLE_KEY  service role key (reads reactions; writes the engine tables)
name: radius-tune

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Evaluate + print the SQL plan only, do not apply'
        type: boolean
        default: false
  schedule:
    - cron: '30 5 * * *'   # daily 05:30 UTC (ahead of refinement-run 06:00 + fetch 08:00)

concurrency:
  group: radius-tune
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard — required secrets present
        id: guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::radius-tune skipped — set SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY repo secrets to enable it."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tune — learn + apply the per-area radius (REST, service role)
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — printing the SQL plan only, not applying:"
            node tools/radius-tune.mjs
          else
            node tools/radius-tune.mjs --apply
          fi
