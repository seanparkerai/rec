# Throwaway probe runner for Phase L0 of v3 "Live Listings".
# Runs tools/probe-rightmove.mjs on a GitHub runner (which HAS internet, unlike
# the Claude sandbox), then commits the captured output to artifacts/probe-output.txt
# so it can be read back without anyone copy-pasting terminal output.
#
# Triggers:
#   - workflow_dispatch: tap "Run workflow" in the Actions tab (phone-friendly).
#   - push to .github/probe.trigger: bumping that file re-runs the probe.
# Output never re-triggers (artifacts/ is not a trigger path), so no loops.
#
# Delete this workflow once L1 has a real, validated fetcher.
name: probe-listings

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/probe.trigger'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run probe (capture output, never fail the job)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p artifacts
          set +e
          node tools/probe-rightmove.mjs > artifacts/probe-output.txt 2>&1
          echo "" >> artifacts/probe-output.txt
          echo "(probe exit code: $?)" >> artifacts/probe-output.txt
          set -e
          # Mirror to the run summary so it's visible in the Actions UI too.
          {
            echo '## L0 probe output'
            echo '```'
            cat artifacts/probe-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit output back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/probe-output.txt
          if git diff --staged --quiet; then
            echo "no change in probe output"
          else
            git commit -m "L0 probe output [skip ci]"
            git push
          fi
