# prune-branches — delete superseded remote branches (repo maintenance).
#
# WHY. Managed Claude Code remote sessions push per-session `claude/*` branches whose
# work re-lands on `main` (CLAUDE.md §0 — production-first, direct-to-main). The session
# credential can push but cannot DELETE refs (403), so stale branches accumulate. This
# workflow lets the Actions GITHUB_TOKEN (contents: write) do the deletion instead —
# dispatch it with a space-separated list of branches.
#
# SAFETY. `main` (and anything not explicitly listed) is never touched; the ruleset
# (adr/0008) independently blocks deleting `main` even if it were listed. Each branch is
# deleted individually so one bad name doesn't abort the rest; missing branches are
# reported, not fatal.
#
# TRIGGERS. Two, because the GitHub App integration used by Claude sessions cannot call
# the dispatch API (403) — but it CAN push. (1) workflow_dispatch with a `branches`
# input, for humans; (2) a push to main touching `.github/prune-branches.txt` — the
# file's non-comment lines are the deletion list, so a session prunes by committing the
# list. The file is a one-shot request record, not state: it stays in-tree after the run.

name: prune-branches

on:
  workflow_dispatch:
    inputs:
      branches:
        description: "Space-separated branch names to delete (never main)"
        required: true
        type: string
  push:
    branches: [main]
    paths: ['.github/prune-branches.txt']

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Delete listed branches
        env:
          BRANCHES: ${{ inputs.branches }}
        run: |
          set -u
          # Dispatch input wins; otherwise read the pushed control file (strip comments/blanks).
          if [ -z "${BRANCHES:-}" ] && [ -f .github/prune-branches.txt ]; then
            BRANCHES=$(grep -v '^#' .github/prune-branches.txt | tr '\n' ' ')
          fi
          failed=0
          for b in $BRANCHES; do
            case "$b" in
              main|HEAD|refs/*)
                echo "::warning::refusing to delete protected/ref-form name: $b"; continue ;;
            esac
            if git push origin --delete "$b"; then
              echo "deleted: $b"
            else
              echo "::warning::could not delete: $b (missing or protected)"
              failed=$((failed+1))
            fi
          done
          echo "done ($failed warnings)"
