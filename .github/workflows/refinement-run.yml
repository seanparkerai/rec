# refinement-run — Model Refinement Engine scheduled evaluation.
#
# Runs tools/refinement-run.mjs on a GitHub runner (which has the service-role key,
# unlike the Claude sandbox), then applies the emitted SQL plan with psql. NOTIFY-ONLY:
# the plan touches only refinement_suggestions / refinement_runs / sync_log — never
# listings, criteria, zones, or the scrape scope. The engine proposes; the user confirms.
#
# WHY A CADENCE. The persistence gate requires a value to qualify on several CONSECUTIVE
# runs before it becomes actionable (Cautious 5 / Balanced 3 / Aggressive 2). With no
# regular cadence the counter never accumulates, so suggestions never surface. A daily
# run lets forming patterns mature into suggestions over a few days.
#
# Triggers:
#   - workflow_dispatch: tap "Run workflow" in the Actions tab (phone-friendly).
#   - schedule: once daily at 06:00 UTC. Best-effort timing is fine — this is idempotent
#     (the SQL is an UPSERT with a status guard; re-running the same day is harmless).
#
# REQUIRED REPO SECRETS (the owner must add these before the schedule does anything):
#   - SUPABASE_URL               e.g. https://<project>.supabase.co  (PostgREST reads)
#   - SUPABASE_SERVICE_ROLE_KEY  service role key (reads reactions/suggestions/prefs)
#   - SUPABASE_DB_URL            Postgres connection string (psql applies the SQL plan)
# OPTIONAL:
#   - REFINEMENT_HOUSEHOLD_ID    target a specific household; omitted → the first household
#
# If a secret is missing the job no-ops with a clear message rather than failing red.
name: refinement-run

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Evaluate + print the SQL plan only, do not apply'
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC

concurrency:
  group: refinement-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard — required secrets present
        id: guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::refinement-run skipped — set SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY and SUPABASE_DB_URL repo secrets to enable it."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate — emit the SQL plan
        if: steps.guard.outputs.ready == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HOUSEHOLD_ID: ${{ secrets.REFINEMENT_HOUSEHOLD_ID }}
        run: |
          ARGS=""
          if [ -n "$HOUSEHOLD_ID" ]; then ARGS="--household $HOUSEHOLD_ID"; fi
          node tools/refinement-run.mjs $ARGS --emit-sql /tmp/refinement-plan.sql

      - name: Apply — run the plan with psql
        if: steps.guard.outputs.ready == 'true' && inputs.dry_run != true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f /tmp/refinement-plan.sql

      - name: Invariant — scrape-scope check (non-blocking)
        if: steps.guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node tools/refinement-scope-check.mjs || true
