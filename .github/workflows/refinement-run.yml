# refinement-run — Model Refinement Engine scheduled evaluation.
#
# Runs tools/refinement-run.mjs on a GitHub runner. Since 2026-07-05 (owner-directed
# §16 phase) the job EVALUATES AND APPLIES in one step via PostgREST (`--apply`) using
# the service-role key — the same two secrets every other scheduled job here already
# uses. The former psql apply path (and its SUPABASE_DB_URL secret, which was never
# provisioned and silently skipped every run 2026-06-08 → 2026-07-05) is gone for good.
# NOTIFY-ONLY: the plan touches only refinement_suggestions / refinement_runs /
# sync_log (+ the scrape_probation status HINT) — never listings, criteria, zones, or
# the scrape scope. The engine proposes; the user confirms.
#
# WHY A CADENCE. The persistence gate requires a value to qualify on several CONSECUTIVE
# runs before it becomes actionable (Cautious 5 / Balanced 3 / Aggressive 2). With no
# regular cadence the counter never accumulates, so suggestions never surface. A daily
# run lets forming patterns mature into suggestions over a few days. (The Trends page
# additionally evaluates LIVE in the browser — this job is the enforcement/audit path.)
#
# Triggers:
#   - workflow_dispatch: tap "Run workflow" in the Actions tab (phone-friendly).
#   - schedule: once daily at 06:00 UTC. Best-effort timing is fine — this is idempotent
#     (the upsert carries a status guard; re-running the same day is harmless).
#
# REQUIRED REPO SECRETS (both present and used daily by fetch-listings):
#   - SUPABASE_URL               e.g. https://<project>.supabase.co  (PostgREST reads + writes)
#   - SUPABASE_SERVICE_ROLE_KEY  service role key
# OPTIONAL:
#   - REFINEMENT_HOUSEHOLD_ID    target a specific household; omitted → the first household
#
# If a secret is missing the job no-ops with a clear message rather than failing red.
name: refinement-run

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Evaluate + print the SQL plan only, do not apply'
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC

concurrency:
  group: refinement-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Guard — required secrets present
        id: guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::refinement-run skipped — set SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY repo secrets to enable it."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate + apply via PostgREST
        if: steps.guard.outputs.ready == 'true' && inputs.dry_run != true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HOUSEHOLD_ID: ${{ secrets.REFINEMENT_HOUSEHOLD_ID }}
        run: |
          ARGS=""
          if [ -n "$HOUSEHOLD_ID" ]; then ARGS="--household $HOUSEHOLD_ID"; fi
          node tools/refinement-run.mjs $ARGS --apply

      - name: Dry run — evaluate + print the SQL plan only
        if: steps.guard.outputs.ready == 'true' && inputs.dry_run == true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HOUSEHOLD_ID: ${{ secrets.REFINEMENT_HOUSEHOLD_ID }}
        run: |
          ARGS=""
          if [ -n "$HOUSEHOLD_ID" ]; then ARGS="--household $HOUSEHOLD_ID"; fi
          node tools/refinement-run.mjs $ARGS --emit-sql /tmp/refinement-plan.sql
          cat /tmp/refinement-plan.sql

      - name: Invariant — scrape-scope check (non-blocking)
        if: steps.guard.outputs.ready == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node tools/refinement-scope-check.mjs || true
