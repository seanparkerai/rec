# postcodes-accuracy.yml — manual diagnostic: run the postcodes.io accuracy probe
# from a GitHub runner (open internet, unlike the sandboxed Claude session). A dry
# run of the same network + disambiguation path a future stub→curated auto-promotion
# job would use to fetch an area's pin from postcodes.io. Read-only: hits postcodes.io,
# measures the miss against each area's curated ground truth, writes nothing.
#
# Trigger: workflow_dispatch only — tap "Run workflow" in the Actions tab. No schedule,
# no secrets. Leave "area_ids" blank to probe the default 5-area sample.
name: postcodes.io accuracy probe

on:
  workflow_dispatch:
    inputs:
      area_ids:
        description: 'Space/comma-separated area ids to probe (blank = default 5-area sample)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe postcodes.io accuracy
        run: node tools/test-postcodes-accuracy.mjs ${{ inputs.area_ids }}
