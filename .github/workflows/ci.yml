name: CI

# Runs the unified test harness (intelligence tests + offline Supabase-sync suite)
# on every push and pull request. The live Supabase checks skip without creds, so
# this is network-free and deterministic in CI. Pages deploy is separately gated on
# its own `test` job (see pages.yml `needs: test`).

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # Node 22+ is REQUIRED: the ask-tool-contract test loads the edge function's
      # TypeScript via --experimental-strip-types (Node >= 22.6); Node 20 fails the
      # whole harness with "bad option". Keep this aligned with local dev (22.x).
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      # Dev-tooling deps only (jsdom for the tests/pages tier, typescript for
      # Tier-0); the site itself ships no node_modules.
      - name: Install dev dependencies
        run: npm ci
      - name: Run test harness
        run: node tools/run-all-tests.mjs
      # RLS guard rail (overhaul step 1.11): the browser ships the publishable
      # key, so RLS is the whole authorisation model. Fails the build if any
      # public table has RLS disabled. Honest no-op (SKIPPED, exit 0) until the
      # SUPABASE_DB_URL repo secret exists (owner step 2.16).
      - name: RLS guard (online, secret-gated)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node tools/check-rls.mjs

  # Conventional-commit rail (overhaul step 10.2, G3 — docs/adr/0007). Additive
  # job; rollback = delete it. Dependency-free checker, so no setup-node needed —
  # the runner's default Node runs the plain-ESM script fine. fetch-depth 50 so
  # the push range resolves (an unresolvable range reports SKIPPED, not passing).
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 50
      - name: Lint commit messages in the push/PR range
        run: |
          RANGE="${{ github.event.before }}..${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif echo "${{ github.event.before }}" | grep -Eq '^0+$'; then
            RANGE="HEAD~1..HEAD"   # new-branch push: before-sha is all zeros
          fi
          node tools/check-commit-msgs.mjs --range "$RANGE"
