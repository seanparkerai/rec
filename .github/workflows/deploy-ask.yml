# deploy-ask — deploy the Ask edge function from the repo (the ONLY sanctioned path;
# the Supabase dashboard editor is banned by docs/ASK.md §5).
#
# WHY. Claude sessions cannot deploy via the Supabase MCP connector (deploy_edge_function
# needs an interactive approval stream that managed sessions don't have), and the owner
# workflow is production-first — function fixes should reach the platform the same way
# site fixes reach Pages: on push to main. This workflow deploys `ask` whenever function
# source changes, so an agent session repoints/fixes the function by committing.
#
# SECRET. Needs SUPABASE_ACCESS_TOKEN (a personal access token from
# https://supabase.com/dashboard/account/tokens) as a repo Actions secret. Until it
# exists the run is an HONEST NO-OP: a loud warning, green exit (remembership.yml
# pattern) — it never pretends to have deployed.

name: deploy-ask

on:
  push:
    branches: [main]
    paths: ['supabase/functions/**', '.github/workflows/deploy-ask.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ask
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: qxmyrahqsopmaeokxdub
    steps:
      - uses: actions/checkout@v4
      - name: Guard — secret present?
        id: guard
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN repo secret is not set — NOT deploying. Add it (Settings → Secrets → Actions) to enable function deploys from CI."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: supabase/setup-cli@v1
        if: steps.guard.outputs.deploy == 'true'
        with:
          version: latest
      - name: Deploy ask
        if: steps.guard.outputs.deploy == 'true'
        # Run from the repo root: the CLI resolves supabase/functions/<name> against cwd.
        run: supabase functions deploy ask --project-ref "$PROJECT_REF" --use-api
