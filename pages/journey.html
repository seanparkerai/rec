<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journey · rec</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div data-include="components/header.html"></div>
  <div data-include="components/nav.html"></div>

  <main id="main" class="container">
    <header class="page-head has-actions">
      <div>
        <p class="eyebrow">End to end</p>
        <h1>Journey</h1>
        <p class="lead">Three checklists — viewing, buying, moving — to track every step. Your tick state persists locally.</p>
      </div>
      <div class="page-actions">
        <button id="btn-reset-all" class="outline secondary">Clear all checks</button>
      </div>
    </header>

    <section class="tile-card tile-journey" aria-labelledby="journey-overview-h">
      <header class="tile-head">
        <h2 id="journey-overview-h">Where you are</h2>
        <span class="num" id="journey-overall">— done</span>
      </header>
      <ul class="journey-track" id="journey-track"></ul>
      <div class="journey-next">
        <span class="journey-next-label">Next</span>
        <span class="journey-next-text" id="journey-next-text">Loading&hellip;</span>
        <button type="button" class="journey-tick" id="journey-next-tick" aria-label="Mark next action done" disabled>&check;</button>
      </div>
    </section>

    <div class="article">
      <section class="card">
        <header class="check-section-head">
          <h2>Viewing checklist</h2>
          <div class="check-progress">
            <span class="muted" id="progress-viewing">0 / 0 done</span>
            <div class="progress small"><span id="bar-viewing"></span></div>
          </div>
        </header>
        <p class="next-hint" id="next-viewing" hidden></p>
        <ul class="check-list" id="list-viewing"></ul>
      </section>

      <section class="card">
        <header class="check-section-head">
          <h2>Buying process</h2>
          <div class="check-progress">
            <span class="muted" id="progress-process">0 / 0 done</span>
            <div class="progress small"><span id="bar-process"></span></div>
          </div>
        </header>
        <p class="next-hint" id="next-process" hidden></p>
        <ul class="check-list" id="list-process"></ul>
      </section>

      <section class="card">
        <header class="check-section-head">
          <h2>Moving &amp; packing</h2>
          <div class="check-progress">
            <span class="muted" id="progress-moving">0 / 0 done</span>
            <div class="progress small"><span id="bar-moving"></span></div>
          </div>
        </header>
        <p class="next-hint" id="next-moving" hidden></p>
        <ul class="check-list" id="list-moving"></ul>
      </section>
    </div>

    <style>
      .article > .card { display: block; }
      .article > .card + .card { margin-top: var(--space-4); }
      .check-section-head { display: flex; justify-content: space-between; align-items: baseline; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; }
      .check-section-head h2 { margin: 0; }
      .check-progress { display: flex; flex-direction: column; gap: var(--space-1); min-width: 12rem; }
      .next-hint {
        margin: 0 0 var(--space-3);
        padding: var(--space-2) var(--space-3);
        border-left: 3px solid var(--accent);
        background: color-mix(in oklch, var(--accent) 7%, var(--paper));
        color: var(--ink); font-size: var(--text-sm); line-height: 1.4;
        border-radius: 0 var(--rec-radius) var(--rec-radius) 0;
      }
      .next-hint .next-key {
        display: inline-block;
        font-size: var(--text-xs); letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--ink-muted); font-weight: 500; margin-right: var(--space-2);
      }
      .next-hint.is-done {
        border-left-color: var(--ink-subtle);
        background: color-mix(in oklch, var(--ink-subtle) 8%, var(--paper));
        color: var(--ink-muted);
      }
    </style>
  </main>

  <div data-include="components/footer.html"></div>
  <script type="module" src="../assets/js/components.js"></script>
  <script type="module" src="../assets/js/page-journey.js"></script>
</body>
</html>
