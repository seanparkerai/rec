<!doctype html>
<html lang="en">
<head>
  <script>document.documentElement.setAttribute('data-auth-state','pending')</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Areas · GR</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js" defer></script>
</head>
<body>
  <div data-include="components/header.html"></div>
  <div data-include="components/nav.html"></div>

  <main id="main" class="container">
    <header class="page-head has-actions">
      <div>
        <p class="eyebrow">Directory</p>
        <h1>Areas</h1>
        <p class="lead">Your areas — <strong class="num" id="total-count">0</strong> active, <strong class="num" id="paused-count">0</strong> paused, <strong class="num" id="shortlist-count">0</strong> shortlisted.</p>
      </div>
      <div class="page-actions">
        <label class="map-toggle"><input type="checkbox" id="toggle-geofences" checked /> Geofences</label>
        <button id="btn-add-area" class="outline">Add area</button>
        <button id="btn-recentre" class="outline secondary">Recentre</button>
        <button id="btn-clear-zones" class="outline secondary">Clear zones</button>
      </div>
    </header>

    <p class="muted status-line" id="map-status" aria-live="polite">Loading map…</p>

    <section class="card map-card">
      <div id="map" class="map-canvas"></div>
    </section>

    <section class="tiles map-page-tiles" aria-label="Map summary">
      <div class="tile">
        <p class="tile-label">Areas in directory</p>
        <p class="tile-value" id="area-total">—</p>
      </div>
      <div class="tile">
        <p class="tile-label">Mapped (with coords)</p>
        <p class="tile-value accent" id="area-mapped">—</p>
        <p class="tile-sub">geocoding pending</p>
      </div>
      <div class="tile">
        <p class="tile-label">Drawn zones</p>
        <p class="tile-value" id="zone-count">0</p>
        <p class="tile-sub">saved locally</p>
      </div>
    </section>

    <div class="filter-trigger-row">
      <div class="active-filters" id="active-filters" aria-live="polite">No filters set.</div>
      <button type="button" id="open-filters" aria-haspopup="dialog" aria-controls="filter-sheet">Filters</button>
    </div>

    <dialog class="filter-sheet" id="filter-sheet" aria-labelledby="filter-sheet-title" open>
      <article>
        <header>
          <h2 id="filter-sheet-title">Filters</h2>
          <button type="button" class="outline secondary" id="filter-sheet-close" aria-label="Close">Done</button>
        </header>
        <form method="dialog" id="filter-form">
          <div class="filter-row">
            <label class="filter-field">
              <span>County</span>
              <select id="filter-county"></select>
            </label>
            <label class="filter-field">
              <span>Sub-region</span>
              <select id="filter-subregion"></select>
            </label>
            <label class="filter-field">
              <span>Sort by</span>
              <select id="sort">
                <option value="name">Name</option>
                <option value="town">Town</option>
                <option value="postcode">Postcode</option>
                <option value="status">Profile status</option>
                <option value="fit">Fit (best first)</option>
                <option value="price">Avg price (low → high)</option>
                <option value="counciltax">Council tax (A → H)</option>
              </select>
            </label>
          </div>
          <div class="filter-row">
            <label class="filter-field">
              <span>Fit</span>
              <select id="filter-fit">
                <option value="all">Any fit</option>
                <option value="comfortable">Comfortable</option>
                <option value="stretch">Stretch</option>
                <option value="tight">Tight</option>
                <option value="out-of-reach">Out of reach</option>
              </select>
            </label>
            <label class="filter-field">
              <span>Search radius</span>
              <select id="search-radius" aria-label="Search radius">
                <option value="0">Village boundary only</option>
                <option value="1">Within 1 mile</option>
                <option value="3" selected>Within 3 miles</option>
                <option value="5">Within 5 miles</option>
              </select>
            </label>
          </div>
          <div class="filter-row filter-row-end">
            <label class="check-row">
              <input type="checkbox" id="only-shortlisted" />
              <span>Show shortlisted only</span>
            </label>
            <label class="check-row">
              <input type="checkbox" id="show-paused" />
              <span>Show paused areas</span>
            </label>
            <button type="button" id="btn-clear" class="outline secondary">Clear filters</button>
          </div>
        </form>
        <footer>
          <p class="muted filter-sheet-count"><strong class="num" id="filter-sheet-count">0</strong> areas match.</p>
        </footer>
      </article>
    </dialog>

    <div class="area-search-row">
      <input type="search" id="search" placeholder="Search areas by name, town, postcode…" aria-label="Search areas" />
    </div>

    <details class="area-disclosure" id="area-disclosure">
      <summary class="area-disclosure__summary">
        <span class="area-disclosure__label">All areas</span>
        <span class="result-summary"><strong id="result-count">0</strong> shown</span>
      </summary>
      <ol id="areas-grid" class="area-list" aria-live="polite"></ol>
    </details>
  </main>

  <div data-include="components/footer.html"></div>
  <script type="module" src="../assets/js/components.js"></script>
  <script type="module" src="../assets/js/page-areas.js"></script>
  <script type="module" src="../assets/js/page-map.js"></script>
  <script>
    // Filter sheet: inline card on desktop, modal bottom-sheet on mobile.
    (() => {
      const dlg = document.getElementById('filter-sheet');
      const openBtn = document.getElementById('open-filters');
      const closeBtn = document.getElementById('filter-sheet-close');
      const mq = matchMedia('(max-width: 767.98px)');

      function syncMode() {
        if (mq.matches) {
          if (dlg.hasAttribute('open') && !dlg.matches(':modal')) dlg.removeAttribute('open');
        } else {
          if (!dlg.hasAttribute('open')) dlg.setAttribute('open', '');
        }
      }
      openBtn?.addEventListener('click', () => {
        if (dlg.hasAttribute('open')) dlg.close();
        dlg.showModal();
      });
      closeBtn?.addEventListener('click', () => dlg.close());
      mq.addEventListener?.('change', syncMode);
      syncMode();

      // Mirror "x active filters" summary on the trigger row.
      const active = document.getElementById('active-filters');
      const sheetCount = document.getElementById('filter-sheet-count');
      const resultCount = document.getElementById('result-count');
      function refreshSummary() {
        const parts = [];
        const q = document.getElementById('search')?.value?.trim();
        const c = document.getElementById('filter-county')?.value;
        const s = document.getElementById('filter-subregion')?.value;
        const sl = document.getElementById('only-shortlisted')?.checked;
        const paused = document.getElementById('show-paused')?.checked;
        if (q) parts.push(`<span class="filter-pill">“${q}”</span>`);
        if (c && c !== 'all') parts.push(`<span class="filter-pill">${c}</span>`);
        if (s && s !== 'all') parts.push(`<span class="filter-pill">${s}</span>`);
        if (sl) parts.push(`<span class="filter-pill">★ shortlisted</span>`);
        if (paused) parts.push(`<span class="filter-pill">incl. paused</span>`);
        active.innerHTML = parts.length ? parts.join('') : 'No filters set.';
        if (sheetCount && resultCount) sheetCount.textContent = resultCount.textContent || '0';
      }
      document.addEventListener('input', (e) => {
        if (e.target?.closest('#filter-sheet') || e.target?.id === 'search') refreshSummary();
      });
      document.addEventListener('change', (e) => {
        if (e.target?.closest('#filter-sheet')) refreshSummary();
      });
      // Also refresh after the page script renders results (areas list changes).
      const ol = document.getElementById('areas-grid');
      if (ol) new MutationObserver(refreshSummary).observe(ol, { childList: true });
      document.addEventListener('shell:ready', refreshSummary);
      refreshSummary();
    })();
  </script>
</body>
</html>
