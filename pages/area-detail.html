<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Area · rec</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div data-include="components/header.html"></div>
  <div data-include="components/nav.html"></div>

  <main id="main" class="container">
    <p class="back-link"><a href="areas.html">← Back to areas</a></p>

    <header class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;">
      <div>
        <p class="eyebrow" id="area-village">Area profile</p>
        <h1 id="area-title">Area</h1>
        <p class="lead" id="area-meta"></p>
      </div>
      <div class="page-actions">
        <button id="btn-star" aria-pressed="false">☆ Add to shortlist</button>
      </div>
    </header>

    <dl class="stat-strip" aria-label="Key facts">
      <div><dt>Status</dt>     <dd class="is-text" id="tile-status">—</dd></div>
      <div><dt>Sub-region</dt> <dd class="is-text" id="tile-subregion">—</dd></div>
      <div><dt>Postcode</dt>   <dd class="num" id="tile-postcode">—</dd></div>
      <div><dt>County</dt>     <dd class="is-text" id="tile-county">—</dd></div>
    </dl>

    <article class="article">
      <section class="article-section" id="sec-overview-wrap">
        <h2>Overview</h2>
        <div class="prose" id="sec-overview"></div>
      </section>
      <section class="article-section">
        <h2>Amenities</h2>
        <div id="sec-amenities"></div>
      </section>
      <section class="article-section">
        <h2>Schools</h2>
        <div id="sec-schools"></div>
      </section>
      <section class="article-section">
        <h2>Transport &amp; commutes</h2>
        <div id="sec-transport"></div>
      </section>
      <section class="article-section">
        <h2>Prices</h2>
        <div id="sec-prices"></div>
      </section>
      <section class="article-section">
        <h2>Things to do</h2>
        <div id="sec-things"></div>
      </section>
      <section class="article-section">
        <h2>Places to eat</h2>
        <div id="sec-eat"></div>
      </section>
      <section class="article-section">
        <h2>Pros &amp; cons</h2>
        <div id="sec-proscons"></div>
      </section>
      <section class="article-section">
        <h2>Who it suits</h2>
        <div id="sec-suits"></div>
      </section>
      <div id="extras"></div>
    </article>
  </main>

  <div data-include="components/footer.html"></div>
  <script type="module" src="../assets/js/components.js"></script>
  <script type="module" src="../assets/js/page-area-detail.js"></script>
</body>
</html>
