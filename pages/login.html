<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in · rec</title>
  <meta name="description" content="Sign in to rec — your property search dashboard." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: 100dvh;
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Split layout ───────────────────────────────────────────────── */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100dvh;
    }

    /* ── Left panel — dark, editorial ───────────────────────────────── */
    .panel-left {
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--space-12) clamp(var(--space-8), 6vw, var(--space-24));
      padding-top: max(var(--space-12), env(safe-area-inset-top));
      padding-left: max(clamp(var(--space-8), 6vw, var(--space-24)), env(safe-area-inset-left));
      position: relative;
      overflow: hidden;
    }

    /* Faint typographic texture — area names repeated in the background */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        180deg,
        color-mix(in oklch, var(--paper) 3%, transparent) 0px,
        color-mix(in oklch, var(--paper) 3%, transparent) 1px,
        transparent 1px,
        transparent 48px
      );
      pointer-events: none;
    }

    .panel-left-top {
      position: relative;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--paper);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 500;
      color: var(--paper);
      letter-spacing: -0.015em;
    }

    /* Centre piece */
    .panel-left-mid {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-block: var(--space-16);
    }

    .panel-headline {
      font-family: var(--font-display);
      font-optical-sizing: auto;
      font-size: clamp(2.4rem, 3.5vw + 1rem, 4rem);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--paper);
      max-width: 10ch;
    }

    .panel-headline em {
      font-style: italic;
      color: color-mix(in oklch, var(--accent) 80%, var(--paper));
    }

    .panel-sub {
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: color-mix(in oklch, var(--paper) 55%, transparent);
      line-height: 1.6;
      max-width: 30ch;
    }

    /* Bottom caption */
    .panel-left-bottom {
      position: relative;
    }

    .panel-caption {
      font-family: var(--font-data);
      font-size: var(--text-xs);
      color: color-mix(in oklch, var(--paper) 30%, transparent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Accent rule above caption */
    .panel-caption::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
      margin-bottom: var(--space-3);
    }

    /* ── Right panel — light, form ───────────────────────────────────── */
    .panel-right {
      background: var(--paper, #faf9f7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) clamp(var(--space-8), 6vw, var(--space-24));
      padding-top: max(var(--space-12), env(safe-area-inset-top));
      padding-right: max(clamp(var(--space-8), 6vw, var(--space-24)), env(safe-area-inset-right));
    }

    .form-well {
      width: 100%;
      max-width: 360px;
    }

    .form-heading {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: var(--space-2);
    }

    .form-subheading {
      font-size: var(--text-sm);
      color: color-mix(in oklch, var(--ink) 50%, var(--paper, #faf9f7));
      margin-bottom: var(--space-8);
      line-height: 1.5;
    }

    /* Error */
    .login-error {
      background: color-mix(in oklch, oklch(55% 0.18 25) 10%, var(--paper, #faf9f7));
      border: 1px solid color-mix(in oklch, oklch(55% 0.18 25) 40%, transparent);
      border-radius: 8px;
      color: oklch(38% 0.18 25);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      margin-bottom: var(--space-5);
      display: none;
      line-height: 1.5;
    }
    .login-error.visible { display: block; }

    /* Fields */
    .field {
      margin-bottom: var(--space-4);
    }

    .field label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: color-mix(in oklch, var(--ink) 55%, var(--paper, #faf9f7));
      margin-bottom: var(--space-2);
    }

    .field input {
      width: 100%;
      background: color-mix(in oklch, var(--ink) 4%, var(--paper, #faf9f7));
      border: 1px solid color-mix(in oklch, var(--ink) 14%, var(--paper, #faf9f7));
      border-radius: 8px;
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--ink);
      transition: border-color 120ms ease, background 120ms ease;
      outline: none;
      /* Override Pico */
      margin: 0;
    }

    .field input:focus {
      border-color: var(--accent);
      background: var(--paper, #faf9f7);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
    }

    .field input::placeholder {
      color: color-mix(in oklch, var(--ink) 30%, var(--paper, #faf9f7));
    }

    /* Submit */
    .btn-signin {
      width: 100%;
      margin-top: var(--space-6);
      padding: var(--space-3) var(--space-4);
      background: var(--ink);
      color: var(--paper, #faf9f7);
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms ease, opacity 120ms ease;
      min-height: 48px;
    }

    .btn-signin:hover {
      background: color-mix(in oklch, var(--ink) 85%, var(--paper, #faf9f7));
    }

    .btn-signin:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-signin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Mobile: single column ───────────────────────────────────────── */
    @media (max-width: 767px) {
      html, body { background: var(--paper, #faf9f7); }

      .split {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .panel-left {
        padding: max(var(--space-6), env(safe-area-inset-top)) var(--space-6) var(--space-6);
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
      }

      .panel-left::before { display: none; }
      .panel-left-mid, .panel-left-bottom { display: none; }

      .panel-left-top { flex: 1; }

      .panel-right {
        padding: var(--space-8) var(--space-6);
        padding-bottom: max(var(--space-8), env(safe-area-inset-bottom));
        justify-content: flex-start;
      }

      .form-well { max-width: 100%; }

      .form-heading { font-size: var(--text-xl); }
    }

    /* ── Reduced motion ─────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .field input, .btn-signin { transition: none; }
    }
  </style>
</head>
<body>
  <div class="split">

    <!-- ── Left: identity panel ───────────────────────────────────── -->
    <div class="panel-left" aria-hidden="true">
      <div class="panel-left-top">
        <div class="brand-lockup">
          <span class="brand-mark">r</span>
          <span class="brand-name">rec</span>
        </div>
      </div>

      <div class="panel-left-mid">
        <h1 class="panel-headline">Every<br>decision,<br><em>clear.</em></h1>
        <p class="panel-sub">Your property search — budgets, areas, and shortlists — in one place.</p>
      </div>

      <div class="panel-left-bottom">
        <p class="panel-caption">Hampshire &amp; Wiltshire</p>
      </div>
    </div>

    <!-- ── Right: form panel ──────────────────────────────────────── -->
    <div class="panel-right">
      <div class="form-well">
        <h2 class="form-heading">Welcome back</h2>
        <p class="form-subheading">Sign in to continue to your dashboard.</p>

        <div class="login-error" id="login-error" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
            />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              autocomplete="current-password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="btn-signin" id="login-submit">Sign in</button>
        </form>
      </div>
    </div>

  </div>

  <script type="module">
    let supabase;
    try {
      const mod = await import('../assets/js/supabase-client.js');
      supabase = mod.supabase;
    } catch {
      document.getElementById('login-error').textContent =
        'App is not configured yet — contact the site owner.';
      document.getElementById('login-error').classList.add('visible');
      document.getElementById('login-submit').disabled = true;
    }

    if (supabase) {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const params = new URLSearchParams(location.search);
        location.replace(params.get('next') || '../index.html');
      }
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabase) return;

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.add('visible');
        return;
      }

      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
        document.getElementById('login-password').focus();
        return;
      }

      const params = new URLSearchParams(location.search);
      location.replace(params.get('next') || '../index.html');
    });
  </script>
</body>
</html>
