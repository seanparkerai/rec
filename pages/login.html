<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in · GR</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="description" content="Sign in to GR — your property search dashboard." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/pages/login.css" />
</head>
<body>
  <div class="split">

    <!-- ── Left: identity panel ───────────────────────────────────── -->
    <div class="panel-left" aria-hidden="true">
      <div class="panel-left-top">
        <div class="brand-lockup">
          <span class="brand-mark">
            <svg viewBox="0 0 1254 1254" aria-hidden="true" focusable="false">
              <g fill="none" stroke="currentColor" stroke-width="40" stroke-linejoin="round" stroke-linecap="round">
                <rect x="248" y="247" width="81" height="27" rx="1"/><rect x="255" y="272" width="62" height="131" rx="1"/>
                <rect x="917" y="247" width="81" height="27" rx="1"/><rect x="925" y="272" width="62" height="131" rx="1"/>
                <path d="M221 439 L411 309 L843 309 L1030 439 Z"/><rect x="221" y="439" width="806" height="30" rx="1"/>
                <rect x="234" y="468" width="776" height="528" rx="1"/>
                <g stroke-width="24">
                  <defs><g id="gr-win-l">
                    <rect x="334" y="513" width="113" height="17" rx="1"/><rect x="342" y="529" width="96" height="141" rx="1"/>
                    <rect x="334" y="671" width="113" height="17" rx="1"/>
                    <line x1="390" y1="529" x2="390" y2="670"/><line x1="342" y1="599" x2="438" y2="599"/>
                  </g></defs>
                  <use href="#gr-win-l"/><use href="#gr-win-l" transform="translate(236 0)"/><use href="#gr-win-l" transform="translate(472 0)"/>
                  <use href="#gr-win-l" transform="translate(0 247)"/><use href="#gr-win-l" transform="translate(472 247)"/>
                </g>
                <path d="M560 996 L560 812 A64 64 0 0 1 688 812 L688 996 Z"/>
                <path d="M581 806 A43 43 0 0 1 667 806 L581 806 Z"/>
              </g>
            </svg>
          </span>
          <span class="brand-name">GR</span>
        </div>
      </div>

      <div class="panel-left-mid">
        <h1 class="panel-headline">Every<br>decision,<br><em>clear.</em></h1>
        <p class="panel-sub">Your property search — budgets, areas, and shortlists — in one place.</p>
      </div>

    </div>

    <!-- ── Right: form panel ──────────────────────────────────────── -->
    <div class="panel-right">
      <div class="form-well">
        <h2 class="form-heading">Welcome back</h2>
        <p class="form-subheading">Sign in to continue to your dashboard.</p>

        <div class="login-error" id="login-error" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
            />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              autocomplete="current-password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="btn-signin" id="login-submit">Sign in</button>
        </form>
      </div>
    </div>

  </div>

  <script type="module">
    let supabase;
    try {
      const mod = await import('../assets/js/supabase-client.js');
      supabase = mod.supabase;
    } catch {
      document.getElementById('login-error').textContent =
        'App is not configured yet — contact the site owner.';
      document.getElementById('login-error').classList.add('visible');
      document.getElementById('login-submit').disabled = true;
    }

    if (supabase) {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const params = new URLSearchParams(location.search);
        location.replace(params.get('next') || '../index.html');
      }
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabase) return;

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.add('visible');
        return;
      }

      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
        document.getElementById('login-password').focus();
        return;
      }

      const params = new URLSearchParams(location.search);
      location.replace(params.get('next') || '../index.html');
    });
  </script>
</body>
</html>
