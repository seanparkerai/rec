<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Profile · rec</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div data-include="components/header.html"></div>
  <div data-include="components/nav.html"></div>

  <main id="main" class="container">
    <header class="page-head">
      <p class="eyebrow">About the buyer</p>
      <h1>Profile <span class="chip" id="overlay-badge" hidden>Local edits</span></h1>
      <p class="lead" id="headline-lead">Who you are, how you want to live, what you're looking for.</p>
    </header>

    <dl class="stat-strip" aria-label="Headline figures">
      <div><dt>Max property</dt> <dd class="num" id="tile-budget">—</dd></div>
      <div><dt>Deposit target</dt><dd class="num" id="tile-deposit">—</dd></div>
      <div><dt>Saved to date</dt><dd class="num" id="tile-saved">—</dd></div>
      <div><dt>Moving window</dt><dd class="is-text" id="tile-window">—</dd></div>
    </dl>

    <p class="status-line" id="status" aria-live="polite"></p>

    <article class="article" id="article-view" aria-label="Profile sections">
      <section class="article-section" id="sec-buyer">
        <h2>Who&rsquo;s buying</h2>
        <dl class="field-list" id="dl-buyer"></dl>
      </section>
      <section class="article-section" id="sec-lifestyle">
        <h2>How we want to live</h2>
        <dl class="field-list" id="dl-lifestyle"></dl>
      </section>
      <section class="article-section" id="sec-priorities">
        <h2>Priorities</h2>
        <ul class="chip-grid" id="chips-priorities"></ul>
      </section>
      <section class="article-section" id="sec-dealbreakers">
        <h2>Deal-breakers</h2>
        <ul class="chip-grid" id="chips-dealbreakers"></ul>
      </section>
      <section class="article-section" id="sec-notes">
        <h2>Notes</h2>
        <p class="prose" id="p-notes"></p>
      </section>
    </article>

    <dialog id="edit-dialog" aria-labelledby="edit-title">
      <article>
        <header style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-3);">
          <h2 id="edit-title" style="margin:0;">Edit profile</h2>
          <button type="button" class="outline secondary" id="dlg-close" aria-label="Close" style="margin:0;min-height:44px;">Cancel</button>
        </header>
        <form id="edit-form" method="dialog">
          <div id="edit-fields"></div>
        </form>
        <footer style="display:flex;justify-content:space-between;gap:var(--space-3);">
          <button type="button" class="outline secondary" id="btn-reset">Reset to defaults</button>
          <button type="button" id="btn-save">Save</button>
        </footer>
      </article>
    </dialog>

    <div class="page-actions" style="display:flex;gap:var(--space-3);margin-top:var(--space-6);">
      <button id="btn-edit">Edit profile</button>
    </div>
  </main>

  <div data-include="components/footer.html"></div>
  <script type="module" src="../assets/js/components.js"></script>
  <script type="module" src="../assets/js/page-profile.js"></script>
</body>
</html>
