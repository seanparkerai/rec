<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search criteria · rec</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div data-include="components/header.html"></div>
  <div data-include="components/nav.html"></div>

  <main id="main" class="container">
    <header class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;">
      <div>
        <p class="eyebrow">Filters &amp; signals</p>
        <h1>Search criteria <span class="chip" id="overlay-badge" hidden>Local edits</span></h1>
        <p class="lead">Must-haves vs nice-to-haves, property types, budget, mortgage assumptions.</p>
      </div>
      <div class="page-actions" style="display:flex;gap:var(--space-2);">
        <button id="btn-edit">Edit</button>
        <button id="btn-save" hidden>Save</button>
        <button id="btn-cancel" class="secondary" hidden>Cancel</button>
        <button id="btn-reset" class="outline secondary" hidden>Reset to defaults</button>
      </div>
    </header>

    <style>
      /* Sticky save bar appears below the form only while editing on mobile */
      [data-editing-criteria] body { padding-bottom: 6rem; }
      .criteria-save-bar {
        display: none;
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
        padding: var(--space-3) max(var(--space-4), env(safe-area-inset-left)) max(var(--space-3), env(safe-area-inset-bottom)) max(var(--space-4), env(safe-area-inset-right));
        background: color-mix(in oklch, var(--paper) 94%, transparent);
        -webkit-backdrop-filter: saturate(160%) blur(12px); backdrop-filter: saturate(160%) blur(12px);
        border-top: 1px solid var(--hairline);
      }
      [data-editing-criteria] .criteria-save-bar { display: flex; gap: var(--space-3); justify-content: flex-end; align-items: center; }
      .criteria-save-bar .criteria-save-status { margin: 0 auto 0 0; color: var(--ink-muted); font-size: var(--text-sm); }
      .criteria-save-bar button { margin: 0; min-height: 44px; }
    </style>

    <div class="criteria-save-bar" aria-hidden="false">
      <span class="criteria-save-status">Editing — unsaved changes are kept locally on Save.</span>
      <button type="button" class="secondary" onclick="document.getElementById('btn-cancel').click()">Cancel</button>
      <button type="button" onclick="document.getElementById('btn-save').click()">Save</button>
    </div>
    <p class="muted status-line" id="status" aria-live="polite"></p>

    <section class="tiles" aria-label="Key figures">
      <div class="tile">
        <p class="tile-label">Max property price</p>
        <p class="tile-value accent" id="tile-max-price">—</p>
        <p class="tile-sub">budget</p>
      </div>
      <div class="tile">
        <p class="tile-label">Min bedrooms</p>
        <p class="tile-value" id="tile-min-beds">—</p>
        <p class="tile-sub">requirement</p>
      </div>
      <div class="tile">
        <p class="tile-label">Must-haves</p>
        <p class="tile-value" id="tile-must-count">0</p>
        <p class="tile-sub">priorities</p>
      </div>
      <div class="tile">
        <p class="tile-label">Nice-to-haves</p>
        <p class="tile-value" id="tile-nice-count">0</p>
        <p class="tile-sub">weighted</p>
      </div>
    </section>

    <div class="dash-grid">
      <section class="card span-6" id="card-budget"></section>
      <section class="card span-6" id="card-size"></section>
      <section class="card span-6" id="card-types"></section>
      <section class="card span-6" id="card-tenure"></section>
      <section class="card span-6" id="card-features"></section>
      <section class="card span-6" id="card-condition"></section>
      <section class="card span-6" id="card-freshness"></section>
      <section class="card span-6" id="card-keywords"></section>
      <section class="card span-6" id="card-mortgage"></section>
      <section class="card span-12" id="card-priorities"></section>
    </div>
  </main>

  <div data-include="components/footer.html"></div>
  <script type="module" src="../assets/js/components.js"></script>
  <script type="module" src="../assets/js/page-criteria.js"></script>
</body>
</html>
