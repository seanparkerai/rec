<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div data-include="components/header.html"></div>
  <div data-include="components/nav.html"></div>

  <main id="main" class="container rejected-page">
    <header class="page-head">
      <p class="eyebrow">Archive</p>
      <h1>Rejected &amp; passed</h1>
      <p class="lead">Every property you’ve passed or rejected, most recent first — kept off the <a href="listings.html">Listings</a> feed so it stays fast. Search by property type or area, and open any row to revisit the dossier.</p>
    </header>

    <div class="listings-filter rejected-filter" data-rejected-filter role="search">
      <input type="search" class="listings-filter__search" data-control="search"
             placeholder="Search by property type or area…" aria-label="Search passed and rejected properties" />
    </div>

    <p data-rejected-summary class="listings-summary" aria-live="polite"></p>

    <div class="prop-list" data-rejected-list role="list" aria-label="Passed and rejected properties"></div>

    <nav class="rejected-pager" data-rejected-pager aria-label="Pagination" hidden>
      <button type="button" class="outline secondary" data-rejected-prev>← Previous</button>
      <span class="rejected-pager__info num" data-rejected-pageinfo aria-live="polite"></span>
      <button type="button" class="outline secondary" data-rejected-next>Next →</button>
    </nav>

    <div class="rejected-empty" data-rejected-empty hidden></div>
  </main>

  <div data-include="components/footer.html"></div>
