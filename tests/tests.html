<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tests · GR</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <main class="container">
    <div class="page-head">
      <h1>Test results</h1>
      <p class="muted">Schema, smoke and storage checks. Serve over HTTP (e.g. <code>python3 -m http.server</code>).</p>
    </div>
    <section class="card" id="results"><p class="muted">Running…</p></section>
  </main>

  <script type="module">
    import { url, APP_BASE } from '../assets/js/config.js';
    import { loadJSON } from '../assets/js/data-loader.js';
    import * as storage from '../assets/js/storage.js';
    import * as schema from './schemas.js';
    import * as fin from '../assets/js/finances.js';
    import { test, assert, assertEqual, render } from './assert.js';
    import { register as registerAffordability } from './affordability.test.js';
    import { register as registerMoneyFlow } from './money-flow.test.js';
    import { register as registerSavingsVelocity } from './savings-velocity.test.js';
    import { register as registerDepositRisk } from './deposit-risk.test.js';
    import { register as registerAffordabilityScenarios } from './affordability-scenarios.test.js';
    import { register as registerInvestmentPerformance } from './investment-performance.test.js';
    import { register as registerSavingsSeries } from './savings-series.test.js';
    import { register as registerFinanceDerive } from './finance-derive.test.js';
    import { deriveFinances } from '../assets/js/finance-derive.js';

    const fetchOk = async (path) => (await fetch(url(path))).ok;

    // --- config ---
    await test('APP_BASE ends with /', () => assert(APP_BASE.endsWith('/'), APP_BASE));
    await test('url() resolves data path', () => assert(url('data/areas.json').endsWith('/data/areas.json')));

    // --- data load + schema ---
    await test('profile.json loads & valid', async () => { const e = schema.validateProfile(await loadJSON('profile')); assert(e.length === 0, e.join('; ')); });
    await test('criteria.json loads & valid', async () => { const e = schema.validateCriteria(await loadJSON('criteria')); assert(e.length === 0, e.join('; ')); });
    await test('areas.json loads & valid', async () => { const e = schema.validateAreas(await loadJSON('areas')); assert(e.length === 0, e.join('; ')); });
    await test('per-area detail files load & valid (sampled + all "researched")', async () => {
      const index = await loadJSON('areas');
      const ids = new Set();
      // Sample first 3 + last 3 directory stubs to keep the harness fast.
      [...index.slice(0, 3), ...index.slice(-3)].forEach((a) => ids.add(a.id));
      // Plus every area flagged "researched" — these are the ones the user trusts.
      index.filter((a) => a.status === 'researched').forEach((a) => ids.add(a.id));
      const errs = [];
      for (const id of ids) {
        try {
          const detail = await loadJSON(`data/areas/${id}.json`);
          if (detail.id !== id) errs.push(`${id}: detail.id mismatch (${detail.id})`);
          errs.push(...schema.validateAreaDetail(detail).map((m) => `${id}: ${m}`));
        } catch (e) { errs.push(`${id}: ${e.message}`); }
      }
      assert(errs.length === 0, errs.join('; '));
    });
    await test('house-types.json loads & valid', async () => { const e = schema.validateHouseTypes(await loadJSON('house-types')); assert(e.length === 0, e.join('; ')); });
    await test('finances.json loads & valid', async () => { const e = schema.validateFinances(await loadJSON('finances')); assert(e.length === 0, e.join('; ')); });
    await test('checklists.json loads & valid', async () => { const e = schema.validateChecklists(await loadJSON('checklists')); assert(e.length === 0, e.join('; ')); });

    // --- partials reachable ---
    for (const p of ['components/header.html', 'components/nav.html', 'components/footer.html'])
      await test(`partial ${p} reachable`, async () => assert(await fetchOk(p), 'not 200'));

    // --- pages reachable ---
    // Every shipped page that is free of inline style="" / <style> blocks. The
    // inline-style, <style>-block and horizontal-scroll smoke tests below all
    // iterate this list.
    const ALL_PAGES = [
      'index.html', 'pages/about-search.html', 'pages/profile.html', 'pages/criteria.html',
      'pages/areas.html', 'pages/area-detail.html',
      'pages/journey.html', 'pages/finances.html',
      'pages/listings.html', 'pages/saved-listings.html', 'pages/property.html', 'pages/outreach.html',
      'pages/ask.html', 'pages/refinement.html', 'pages/report.html',
      'pages/setup.html', 'pages/login.html',
    ];
    for (const p of ALL_PAGES)
      await test(`page ${p} reachable`, async () => assert(await fetchOk(p), 'not 200'));

    // --- v3 dashboard tiles present ---
    await test('index.html contains v3 dashboard tile ids', async () => {
      const html = await (await fetch(url('index.html'))).text();
      const required = ['tile-scenarios-fan', 'tile-networth', 'tile-withdraw-ready', 'td-savings-spark'];
      const missing = required.filter((id) => !html.includes(`id="${id}"`));
      assert(missing.length === 0, `missing tile ids: ${missing.join(', ')}`);
    });

    // --- v3 finances Investments-topic visuals present (merged page) ---
    await test('pages/finances.html contains v3 Investments-topic section ids', async () => {
      const html = await (await fetch(url('pages/finances.html'))).text();
      const required = [
        'savings-over-time-card', 'monthly-deposits-card', 'isa-stacked-area-card',
        'div-int-cumulative-card', 'epoch-comparison-card', 'ticker-treemap-card',
        'realised-unrealised-card', 'dr-waterfall-svg',
      ];
      const missing = required.filter((id) => !html.includes(`id="${id}"`));
      assert(missing.length === 0, `missing finances v3 ids: ${missing.join(', ')}`);
    });

    // --- §9: no inline style="" attributes shipped in any page ---
    await test('no inline style="" attributes in any page', async () => {
      const offenders = [];
      for (const p of ALL_PAGES) {
        const html = await (await fetch(url(p))).text();
        const stripped = html.replace(/<style[\s\S]*?<\/style>/g, '').replace(/<!--[\s\S]*?-->/g, '');
        if (/\sstyle="/.test(stripped)) offenders.push(p);
      }
      assert(offenders.length === 0, `inline style="" in: ${offenders.join(', ')}`);
    });

    // --- §9: no inline <style> blocks in any page (CSS belongs in components/) ---
    await test('no inline <style> blocks in any page', async () => {
      const offenders = [];
      for (const p of ALL_PAGES) {
        const html = await (await fetch(url(p))).text();
        if (/<style[\s>]/.test(html)) offenders.push(p);
      }
      assert(offenders.length === 0, `inline <style> in: ${offenders.join(', ')}`);
    });

    // --- storage round-trip (throwaway key, no real data touched) ---
    await test('storage round-trips values', () => {
      const { writeLocal, readLocal, removeLocal } = storage._internal;
      writeLocal('__selftest__', { a: 1 });
      assertEqual(JSON.stringify(readLocal('__selftest__')), JSON.stringify({ a: 1 }));
      removeLocal('__selftest__');
      assert(readLocal('__selftest__') === null, 'cleanup failed');
    });

    // --- responsive smoke: no horizontal scroll at current viewport ----------------
    //
    // MANUAL MULTI-WIDTH PROCEDURE (no headless browser in CI — run by hand):
    //   1. Serve the site:  python3 -m http.server  →  open this page per target page.
    //   2. With DevTools device toolbar (or window resize), step through each width and
    //      confirm the page neither scrolls sideways nor clips content:
    //        320 (small phone) · 390 (iPhone) · 768 (tablet portrait) ·
    //        1024 (tablet landscape / small laptop) · 1280 (desktop baseline) ·
    //        landscape 844×390 (phone rotated — checks max-height:600px landscape rules).
    //   3. Repeat for the key pages: Home, Finances, Map, Listing dossier, Login,
    //      Areas, Outreach (dialog open), and one form page (Profile / Data-sync).
    // The assertion below only sees the CURRENT window width, so it is a proxy: it
    // catches overflow at whatever width the developer has the window sized to. Resize
    // to 320px before running to exercise the tightest case.
    await test('no horizontal scroll on this page', () => {
      const d = document.documentElement;
      // allow 1px sub-pixel tolerance
      assert(d.scrollWidth <= d.clientWidth + 1, `scrollWidth ${d.scrollWidth} > clientWidth ${d.clientWidth}`);
    });

    // --- responsive smoke: no key container overflows the viewport at current width --
    // Best-effort, honest about limits: this only inspects the width the window is
    // CURRENTLY at (it cannot reflow to 320px on its own). It localises which landmark /
    // wrapper is wider than the viewport — the usual culprit for the page-level sideways
    // scroll checked above (a min-width grid track, an un-wrapped row, a too-wide block).
    // Elements with overflow-x auto/scroll/hidden are SKIPPED: they contain their own
    // overflow (a scrollable <pre>/table or an intentional chip row) and do not push the
    // page wider, so flagging them would be a false positive.
    await test('no key container overflows viewport (current width)', () => {
      const vw = document.documentElement.clientWidth;
      const sels = ['main', '.container', 'header', 'nav', 'footer', 'table', 'pre', '.tiles', '.cell'];
      const offenders = [];
      for (const sel of sels) {
        for (const el of document.querySelectorAll(sel)) {
          if (el.scrollWidth <= vw + 1) continue;
          const ox = getComputedStyle(el).overflowX;
          if (ox === 'auto' || ox === 'scroll' || ox === 'hidden') continue; // self-contained
          offenders.push(`${sel} (${el.id || el.className || 'el'}: ${el.scrollWidth}px > ${vw}px)`);
        }
      }
      assert(offenders.length === 0, `overflowing at ${vw}px: ${offenders.slice(0, 6).join('; ')}`);
    });

    // --- a11y smoke: skip-link is fetchable from the header partial ---
    await test('header partial includes a skip-link to #main', async () => {
      const html = await (await fetch(url('components/header.html'))).text();
      assert(/class="skip-link"[^>]*href="#main"/.test(html), 'no skip-link in header partial');
    });

    // --- finances calculator benchmarks (pure functions, known inputs → known outputs) ---
    await test('SDLT FTB: £200k → £0 (under £300k threshold)', () => {
      assertEqual(fin.calcSDLT(200000, { firstTimeBuyer: true }), 0);
    });
    await test('SDLT FTB: £380k → £4,000 (5% of £80k above £300k)', () => {
      assertEqual(fin.calcSDLT(380000, { firstTimeBuyer: true }), 4000);
    });
    await test('SDLT FTB: £500k → £10,000 (5% of £200k above £300k)', () => {
      assertEqual(fin.calcSDLT(500000, { firstTimeBuyer: true }), 10000);
    });
    await test('SDLT FTB: £510k → standard rates apply (relief lost)', () => {
      // Standard: 2% × 125k + 5% × 260k = 2500 + 13000 = 15500
      assertEqual(fin.calcSDLT(510000, { firstTimeBuyer: true }), 15500);
    });
    await test('SDLT standard: £300k → £5,000 (2% × 125k + 5% × 50k)', () => {
      assertEqual(fin.calcSDLT(300000), 5000);
    });
    await test('Monthly mortgage: £360k at 5.35% over 35y → ≈£1,900', () => {
      const m = fin.calcMonthlyMortgage(360000, 5.35, 35);
      // Allow 1-pound tolerance for rounding
      assert(Math.abs(m - 1900) < 2, `got ${m}`);
    });
    await test('Monthly mortgage: zero principal → 0', () => {
      assertEqual(fin.calcMonthlyMortgage(0, 5, 30), 0);
    });
    await test('LTV: £360k loan / £400k value → 90%', () => {
      assertEqual(fin.calcLTV(360000, 400000), 90);
    });
    await test('LISA bonus: £4,000 contribution → £1,000 bonus', () => {
      const r = fin.calcLISABonus(4000);
      assertEqual(r.eligible, 4000);
      assertEqual(r.bonus, 1000);
    });
    await test('LISA bonus: £5,000 contribution → capped at £4,000 → £1,000', () => {
      const r = fin.calcLISABonus(5000);
      assertEqual(r.eligible, 4000);
      assertEqual(r.bonus, 1000);
    });
    await test('LISA eligible: £400k → true, £451k → false', () => {
      assert(fin.lisaEligible(400000) === true);
      assert(fin.lisaEligible(451000) === false);
    });
    await test('Deposit progress: £25,660 of £38,000 → 68%', () => {
      assertEqual(fin.calcDepositProgress(25660, 38000), 68);
    });
    await test('Deposit progress: caps at 100', () => {
      assertEqual(fin.calcDepositProgress(50000, 38000), 100);
    });
    await test('Months to target: gap £12,340 at £2,000/mo → 6.2', () => {
      assertEqual(fin.calcMonthsToTarget(25660, 38000, 2000), 6.2);
    });
    await test('Months to target: already at target → 0', () => {
      assertEqual(fin.calcMonthsToTarget(50000, 38000, 2000), 0);
    });

    // --- Phase 2 intelligence modules (affordability, money-flow, savings-velocity) ---
    // Fixtures are derived from raw repo JSON. Consumer-side code always derives before
    // rendering, so the test fixtures mirror that contract — no derived fields are read
    // off the raw record.
    //
    // Derived WITH investments so totals reflect the user's reality: cash + ISA earmark.
    // Gift cards are NOT in totalSavings (they aren't deposit-eligible) — tracked
    // separately as giftCardsTotal.
    const rawFinances = await loadJSON('finances');
    let rawInvestments = null;
    try { rawInvestments = await loadJSON('investments'); } catch { /* optional */ }
    const fixtures = {
      finances: deriveFinances(rawFinances, { investments: rawInvestments }),
      rawFinances,
      investments: rawInvestments,
      criteria: await loadJSON('criteria'),
    };
    await registerFinanceDerive({ test, assert, assertEqual, fixtures });
    await registerAffordability({ test, assert, assertEqual, fixtures });
    await registerMoneyFlow({ test, assert, assertEqual, fixtures });
    await registerSavingsVelocity({ test, assert, assertEqual, fixtures });
    await registerDepositRisk({ test, assert, assertEqual, fixtures });
    await registerAffordabilityScenarios({ test, assert, assertEqual, fixtures });
    await registerInvestmentPerformance({ test, assert, assertEqual, fixtures });
    await registerSavingsSeries({ test, assert, assertEqual, fixtures });

    document.getElementById('results').innerHTML = '';
    render(document.getElementById('results'));
  </script>
</body>
</html>
