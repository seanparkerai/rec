<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tests · rec</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="../assets/css/fonts.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <main class="container">
    <div class="page-head">
      <h1>Test results</h1>
      <p class="muted">Schema, smoke and storage checks. Serve over HTTP (e.g. <code>python3 -m http.server</code>).</p>
    </div>
    <section class="card" id="results"><p class="muted">Running…</p></section>
  </main>

  <script type="module">
    import { url, APP_BASE } from '../assets/js/config.js';
    import { loadJSON } from '../assets/js/data-loader.js';
    import * as storage from '../assets/js/storage.js';
    import * as schema from './schemas.js';
    import * as fin from '../assets/js/finances.js';
    import { test, assert, assertEqual, render } from './assert.js';

    const fetchOk = async (path) => (await fetch(url(path))).ok;

    // --- config ---
    await test('APP_BASE ends with /', () => assert(APP_BASE.endsWith('/'), APP_BASE));
    await test('url() resolves data path', () => assert(url('data/areas.json').endsWith('/data/areas.json')));

    // --- data load + schema ---
    await test('profile.json loads & valid', async () => { const e = schema.validateProfile(await loadJSON('profile')); assert(e.length === 0, e.join('; ')); });
    await test('criteria.json loads & valid', async () => { const e = schema.validateCriteria(await loadJSON('criteria')); assert(e.length === 0, e.join('; ')); });
    await test('areas.json loads & valid', async () => { const e = schema.validateAreas(await loadJSON('areas')); assert(e.length === 0, e.join('; ')); });
    await test('per-area detail files load & valid (sampled + all "researched")', async () => {
      const index = await loadJSON('areas');
      const ids = new Set();
      // Sample first 3 + last 3 directory stubs to keep the harness fast.
      [...index.slice(0, 3), ...index.slice(-3)].forEach((a) => ids.add(a.id));
      // Plus every area flagged "researched" — these are the ones the user trusts.
      index.filter((a) => a.status === 'researched').forEach((a) => ids.add(a.id));
      const errs = [];
      for (const id of ids) {
        try {
          const detail = await loadJSON(`data/areas/${id}.json`);
          if (detail.id !== id) errs.push(`${id}: detail.id mismatch (${detail.id})`);
          errs.push(...schema.validateAreaDetail(detail).map((m) => `${id}: ${m}`));
        } catch (e) { errs.push(`${id}: ${e.message}`); }
      }
      assert(errs.length === 0, errs.join('; '));
    });
    await test('house-types.json loads & valid', async () => { const e = schema.validateHouseTypes(await loadJSON('house-types')); assert(e.length === 0, e.join('; ')); });
    await test('finances.json loads & valid', async () => { const e = schema.validateFinances(await loadJSON('finances')); assert(e.length === 0, e.join('; ')); });
    await test('checklists.json loads & valid', async () => { const e = schema.validateChecklists(await loadJSON('checklists')); assert(e.length === 0, e.join('; ')); });

    // --- partials reachable ---
    for (const p of ['components/header.html', 'components/nav.html', 'components/footer.html'])
      await test(`partial ${p} reachable`, async () => assert(await fetchOk(p), 'not 200'));

    // --- pages reachable ---
    for (const p of ['index.html', 'pages/about-search.html', 'pages/profile.html', 'pages/criteria.html', 'pages/areas.html', 'pages/area-detail.html', 'pages/house-types.html', 'pages/journey.html', 'pages/finances.html', 'pages/map.html'])
      await test(`page ${p} reachable`, async () => assert(await fetchOk(p), 'not 200'));

    // --- storage round-trip (throwaway key, no real data touched) ---
    await test('storage round-trips values', () => {
      const { writeLocal, readLocal, removeLocal } = storage._internal;
      writeLocal('__selftest__', { a: 1 });
      assertEqual(JSON.stringify(readLocal('__selftest__')), JSON.stringify({ a: 1 }));
      removeLocal('__selftest__');
      assert(readLocal('__selftest__') === null, 'cleanup failed');
    });

    // --- responsive smoke: no horizontal scroll at current viewport (acts as a 320px proxy when resized) ---
    await test('no horizontal scroll on this page', () => {
      const d = document.documentElement;
      // allow 1px sub-pixel tolerance
      assert(d.scrollWidth <= d.clientWidth + 1, `scrollWidth ${d.scrollWidth} > clientWidth ${d.clientWidth}`);
    });

    // --- a11y smoke: skip-link is fetchable from the header partial ---
    await test('header partial includes a skip-link to #main', async () => {
      const html = await (await fetch(url('components/header.html'))).text();
      assert(/class="skip-link"[^>]*href="#main"/.test(html), 'no skip-link in header partial');
    });

    // --- finances calculator benchmarks (pure functions, known inputs → known outputs) ---
    await test('SDLT FTB: £200k → £0 (under £300k threshold)', () => {
      assertEqual(fin.calcSDLT(200000, { firstTimeBuyer: true }), 0);
    });
    await test('SDLT FTB: £380k → £4,000 (5% of £80k above £300k)', () => {
      assertEqual(fin.calcSDLT(380000, { firstTimeBuyer: true }), 4000);
    });
    await test('SDLT FTB: £500k → £10,000 (5% of £200k above £300k)', () => {
      assertEqual(fin.calcSDLT(500000, { firstTimeBuyer: true }), 10000);
    });
    await test('SDLT FTB: £510k → standard rates apply (relief lost)', () => {
      // Standard: 2% × 125k + 5% × 260k = 2500 + 13000 = 15500
      assertEqual(fin.calcSDLT(510000, { firstTimeBuyer: true }), 15500);
    });
    await test('SDLT standard: £300k → £5,000 (2% × 125k + 5% × 50k)', () => {
      assertEqual(fin.calcSDLT(300000), 5000);
    });
    await test('Monthly mortgage: £360k at 5.35% over 35y → ≈£1,900', () => {
      const m = fin.calcMonthlyMortgage(360000, 5.35, 35);
      // Allow 1-pound tolerance for rounding
      assert(Math.abs(m - 1900) < 2, `got ${m}`);
    });
    await test('Monthly mortgage: zero principal → 0', () => {
      assertEqual(fin.calcMonthlyMortgage(0, 5, 30), 0);
    });
    await test('LTV: £360k loan / £400k value → 90%', () => {
      assertEqual(fin.calcLTV(360000, 400000), 90);
    });
    await test('LISA bonus: £4,000 contribution → £1,000 bonus', () => {
      const r = fin.calcLISABonus(4000);
      assertEqual(r.eligible, 4000);
      assertEqual(r.bonus, 1000);
    });
    await test('LISA bonus: £5,000 contribution → capped at £4,000 → £1,000', () => {
      const r = fin.calcLISABonus(5000);
      assertEqual(r.eligible, 4000);
      assertEqual(r.bonus, 1000);
    });
    await test('LISA eligible: £400k → true, £451k → false', () => {
      assert(fin.lisaEligible(400000) === true);
      assert(fin.lisaEligible(451000) === false);
    });
    await test('Deposit progress: £25,660 of £38,000 → 68%', () => {
      assertEqual(fin.calcDepositProgress(25660, 38000), 68);
    });
    await test('Deposit progress: caps at 100', () => {
      assertEqual(fin.calcDepositProgress(50000, 38000), 100);
    });
    await test('Months to target: gap £12,340 at £2,000/mo → 6.2', () => {
      assertEqual(fin.calcMonthsToTarget(25660, 38000, 2000), 6.2);
    });
    await test('Months to target: already at target → 0', () => {
      assertEqual(fin.calcMonthsToTarget(50000, 38000, 2000), 0);
    });

    document.getElementById('results').innerHTML = '';
    render(document.getElementById('results'));
  </script>
</body>
</html>
