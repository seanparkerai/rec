<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" width="1254" height="1254" role="img" aria-label="Georgian rectory">
  <!-- Tab-chrome adaptive: ink strokes on light, paper-bright strokes on dark. Values mirror tokens.css --ink. -->
  <style>
    svg { color: oklch(20% 0.020 250); }
    @media (prefers-color-scheme: dark) { svg { color: oklch(94% 0.010 95); } }
  </style>
  <!-- Heavier strokes than the inline logo so the silhouette survives at 16–32 px favicon sizes. -->
  <g fill="none" stroke="currentColor" stroke-width="54" stroke-linejoin="round" stroke-linecap="round">
    <!-- Chimneys -->
    <rect x="248" y="247" width="81" height="27" rx="1"/>
    <rect x="255" y="272" width="62" height="131" rx="1"/>
    <rect x="917" y="247" width="81" height="27" rx="1"/>
    <rect x="925" y="272" width="62" height="131" rx="1"/>
    <!-- Roof -->
    <path d="M221 439 L411 309 L843 309 L1030 439 Z"/>
    <rect x="221" y="439" width="806" height="30" rx="1"/>
    <!-- Main body -->
    <rect x="234" y="468" width="776" height="528" rx="1"/>
    <!-- Windows -->
    <g stroke-width="38">
      <defs>
        <g id="window">
          <rect x="334" y="513" width="113" height="17" rx="1"/>
          <rect x="342" y="529" width="96" height="141" rx="1"/>
          <rect x="334" y="671" width="113" height="17" rx="1"/>
          <line x1="390" y1="529" x2="390" y2="670"/>
          <line x1="342" y1="599" x2="438" y2="599"/>
        </g>
      </defs>
      <use href="#window"/>
      <use href="#window" transform="translate(236 0)"/>
      <use href="#window" transform="translate(472 0)"/>
      <use href="#window" transform="translate(0 247)"/>
      <use href="#window" transform="translate(472 247)"/>
    </g>
    <!-- Door -->
    <path d="M560 996 L560 812 A64 64 0 0 1 688 812 L688 996 Z"/>
    <path d="M581 806 A43 43 0 0 1 667 806 L581 806 Z"/>
  </g>
</svg>
